name: Clio
options:
  bundleIdPrefix: com.willscuderi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  Clio:
    type: application
    platform: macOS
    sources:
      - path: Clio
        excludes:
          - "Resources/Models/*.bin"
      - path: Clio/Resources/Models/ggml-base.en.bin
        buildPhase: resources
    dependencies:
      - framework: Vendor/whisper.xcframework
        embed: false
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: EventKit.framework
      - sdk: libc++.tbd
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Clio/Info.plist
        CODE_SIGN_ENTITLEMENTS: Clio/Clio.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.willscuderi.Clio
        PRODUCT_NAME: Clio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    scheme:
      testTargets:
        - ClioTests
        - ClioUITests

  ClioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ClioTests
    dependencies:
      - target: Clio
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Clio.app/Contents/MacOS/Clio"

  ClioUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/ClioUITests
    dependencies:
      - target: Clio
